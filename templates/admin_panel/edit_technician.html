{% extends "base.html" %}
{% load static %}
{% block title %}ویرایش تکنسین{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/admin.css' %}">{% endblock %}

{% block content %}
    <div class="page-header">
        <h1>✏️ ویرایش اطلاعات {{ tech.user.full_name }}</h1>
        <a href="{% url 'admin_panel:manage_technicians' %}" class="btn btn-outline-secondary">بازگشت</a>
    </div>



    <div class="section-card">
        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label>نام *</label>
                    <input type="text" name="first_name" class="form-input" value="{{ tech.user.first_name }}" required>
                </div>
                <div class="form-group">
                    <label>نام خانوادگی *</label>
                    <input type="text" name="last_name" class="form-input" value="{{ tech.user.last_name }}" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>ایمیل *</label>
                    <input type="email" name="email" class="form-input" value="{{ tech.user.email }}" required>
                </div>
                <div class="form-group">
                    <label>شماره تماس</label>
                    <input type="text" name="phone" class="form-input" value="{{ tech.user.phone|default:'' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>تخصص *</label>
                    <select name="specialty" class="form-input" required>
                        {% for spec in specialties %}
                            <option value="{{ spec.id }}" {% if spec.id == tech.specialty.id %}selected{% endif %}>{{ spec.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>کد پرسنلی</label>
                    <input type="text" class="form-input" value="{{ tech.personnel_code }}" disabled style="background:#f0f0f0;">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>شروع شیفت *</label>
                    <input type="time" name="shift_start" class="form-input" value="{{ tech.shift_start|time:'H:i' }}" required>
                </div>
                <div class="form-group">
                    <label>پایان شیفت *</label>
                    <input type="time" name="shift_end" class="form-input" value="{{ tech.shift_end|time:'H:i' }}" required>
                </div>
            </div>

            <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px;">
                <a href="{% url 'admin_panel:manage_technicians' %}" class="btn btn-outline-secondary" style="padding:10px 24px;">انصراف</a>
                <button type="submit" class="btn btn-primary" style="padding:10px 24px;">ذخیره تغییرات</button>
            </div>
        </form>
    </div>
    <div class="section-card" style="margin-top:20px;border-top:3px solid #DC3545;">
        <h3 style="color:#DC3545;">🔑 تغییر رمز عبور</h3>
        <form method="post" action="{% url 'admin_panel:reset_tech_password' tech.id %}" id="reset-pass-form">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label>رمز عبور جدید *</label>
                    <div style="position:relative;">
                        <input type="password" name="new_password" id="tech-new-pass" class="form-input" minlength="8" required placeholder="حداقل ۸ کاراکتر" style="padding-left:40px;">
                        <button type="button" onclick="var p=document.getElementById('tech-new-pass');if(p.type==='password'){p.type='text';this.textContent='🙈'}else{p.type='password';this.textContent='👁️'}" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;">👁️</button>
                    </div>
                </div>
                <div class="form-group" style="display:flex;align-items:flex-end;">
                    <button type="button" onclick="var chars='ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%';var p='';for(var i=0;i<12;i++)p+=chars.charAt(Math.floor(Math.random()*chars.length));document.getElementById('tech-new-pass').value=p;document.getElementById('tech-new-pass').type='text'" class="btn btn-outline-secondary" style="padding:10px 20px;white-space:nowrap;">🎲 تولید رمز تصادفی</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="background:#DC3545;margin-top:8px;" onclick="return confirm('آیا از تغییر رمز عبور مطمئنید؟')">تغییر رمز عبور</button>
        </form>
    </div>
{% endblock %}
